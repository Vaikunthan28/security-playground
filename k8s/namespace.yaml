# k8s/namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: security-lab
  labels:
    # Pod Security Admission - warns if pod violates baseline security standards
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/warn-version: latest

    # Audit mode logs violations without blocking - good for learning
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/audit-version: latest
